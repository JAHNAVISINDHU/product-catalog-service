openapi: 3.0.3
info:
  title: Product Catalog Service API
  description: A robust e-commerce product catalog microservice implementing the Repository Pattern and Unit of Work.
  version: 1.0.0
  contact:
    name: Product Catalog API
servers:
  - url: /
    description: Local development server

tags:
  - name: Products
    description: Product management endpoints
  - name: Categories
    description: Category management endpoints

paths:
  /products:
    get:
      tags: [Products]
      summary: Get all products (paginated)
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 10, minimum: 1, maximum: 100 }
          description: Number of results to return
        - in: query
          name: skip
          schema: { type: integer, default: 0, minimum: 0 }
          description: Number of results to skip
      responses:
        '200':
          description: Paginated list of products
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Product' } }
                  total: { type: integer }
                  limit: { type: integer }
                  skip: { type: integer }
        '500': { $ref: '#/components/responses/ServerError' }

    post:
      tags: [Products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductInput' }
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/ServerError' }

  /products/search:
    get:
      tags: [Products]
      summary: Search products with filters
      parameters:
        - in: query
          name: keyword
          schema: { type: string }
          description: Search in product name and description
        - in: query
          name: category_ids
          schema: { type: string }
          description: Comma-separated list of category IDs (e.g. 1,2,3)
        - in: query
          name: min_price
          schema: { type: number, minimum: 0 }
          description: Minimum price filter
        - in: query
          name: max_price
          schema: { type: number, minimum: 0 }
          description: Maximum price filter
        - in: query
          name: limit
          schema: { type: integer, default: 10, minimum: 1, maximum: 100 }
        - in: query
          name: skip
          schema: { type: integer, default: 0, minimum: 0 }
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Product' } }
                  total: { type: integer }
                  limit: { type: integer }
                  skip: { type: integer }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/ServerError' }

  /products/{id}:
    get:
      tags: [Products]
      summary: Get a product by ID
      parameters:
        - { $ref: '#/components/parameters/IdParam' }
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

    put:
      tags: [Products]
      summary: Update a product by ID
      parameters:
        - { $ref: '#/components/parameters/IdParam' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductUpdateInput' }
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

    delete:
      tags: [Products]
      summary: Delete a product by ID
      parameters:
        - { $ref: '#/components/parameters/IdParam' }
      responses:
        '204': { description: Product deleted }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /categories:
    get:
      tags: [Categories]
      summary: Get all categories (paginated)
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
        - in: query
          name: skip
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Paginated list of categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Category' } }
                  total: { type: integer }
                  limit: { type: integer }
                  skip: { type: integer }
        '500': { $ref: '#/components/responses/ServerError' }

    post:
      tags: [Categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryInput' }
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Category' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/ServerError' }

  /categories/{id}:
    get:
      tags: [Categories]
      summary: Get a category by ID
      parameters:
        - { $ref: '#/components/parameters/IdParam' }
      responses:
        '200':
          description: Category found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Category' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

    put:
      tags: [Categories]
      summary: Update a category by ID
      parameters:
        - { $ref: '#/components/parameters/IdParam' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryUpdateInput' }
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Category' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

    delete:
      tags: [Categories]
      summary: Delete a category by ID
      parameters:
        - { $ref: '#/components/parameters/IdParam' }
      responses:
        '204': { description: Category deleted }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

components:
  parameters:
    IdParam:
      in: path
      name: id
      required: true
      schema: { type: integer, minimum: 1 }
      description: Resource ID

  schemas:
    Category:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: Electronics }
        description: { type: string, example: Electronic devices and gadgets }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CategoryInput:
      type: object
      required: [name]
      properties:
        name: { type: string, example: Electronics }
        description: { type: string, example: Electronic devices and gadgets }

    CategoryUpdateInput:
      type: object
      properties:
        name: { type: string, example: Electronics }
        description: { type: string, example: Electronic devices and gadgets }

    Product:
      type: object
      properties:
        id: { type: integer, example: 1 }
        name: { type: string, example: Wireless Headphones }
        description: { type: string, example: Premium noise-cancelling headphones }
        price: { type: number, format: float, example: 79.99 }
        stock: { type: integer, example: 150 }
        sku: { type: string, example: ELEC-001 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        categories:
          type: array
          items: { $ref: '#/components/schemas/Category' }

    ProductInput:
      type: object
      required: [name, price]
      properties:
        name: { type: string, example: Wireless Headphones }
        description: { type: string, example: Premium noise-cancelling headphones }
        price: { type: number, format: float, example: 79.99 }
        stock: { type: integer, example: 150, default: 0 }
        sku: { type: string, example: ELEC-001 }
        category_ids:
          type: array
          items: { type: integer }
          example: [1, 2]

    ProductUpdateInput:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        price: { type: number, format: float }
        stock: { type: integer }
        sku: { type: string }
        category_ids:
          type: array
          items: { type: integer }

    Error:
      type: object
      properties:
        error: { type: string }
        message: { type: string }

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Not Found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Conflict - resource already exists
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ServerError:
      description: Internal Server Error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
